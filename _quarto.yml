    theme: cosmo
    toc: true
    toc-depth: 2
    fontsize: 1.05em
    linestretch: 1.6
    include-in-header: analytics.html
  
  pdf:
    documentclass: scrbook
    pdf-engine: xelatex
    mainfont: "Noto Serif"
    sansfont: "Noto Sans"
    monofont: "Noto Sans Mono"
    fontsize: 11pt
    linestretch: 1.4
    geometry:
      - margin=2.5cm
    toc: true
    toc-depth: 2
  
  epub:
    toc: true
    toc-depth: 2